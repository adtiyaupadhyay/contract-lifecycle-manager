<template>
    <lightning-card title="Approval Timeline" icon-name="standard:approval">
        
        <!-- Loading Spinner -->
        <template if:true={isLoading}>
            <lightning-spinner alternative-text="Loading..." size="medium"></lightning-spinner>
        </template>

        <!-- Error Message -->
        <template if:true={error}>
            <div class="slds-m-around_medium">
                <p style="color:red;">Error loading approval steps. Please refresh.</p>
            </div>
        </template>

        <!-- Timeline -->
        <template if:true={hasSteps}>
            <div class="slds-m-around_medium">
                <ul class="slds-timeline">
                    <template for:each={steps} for:item="step">
                        <li key={step.Id} class="slds-timeline__item">
                            <div class="slds-media">
                                <div class="slds-media__figure">
                                    <span class={step.iconClass} title={step.Step_Status__c}>
                                        <lightning-icon 
                                            icon-name={step.iconName} 
                                            size="small">
                                        </lightning-icon>
                                    </span>
                                </div>
                                <div class="slds-media__body">
                                    <div class="slds-grid slds-grid_align-spread">
                                        <p class="slds-text-heading_small">
                                            Step {step.Step_Order__c} — {step.Approver_Role__c}
                                        </p>
                                        <span class={step.badgeClass}>{step.Step_Status__c}</span>
                                    </div>
                                    <p class="slds-text-body_small slds-text-color_weak">
                                        {step.Name}
                                    </p>
                                    <template if:true={step.Approved_Date__c}>
                                        <p class="slds-text-body_small">
                                            ✅ Approved on: {step.Approved_Date__c}
                                        </p>
                                    </template>
                                    <template if:true={step.Comments__c}>
                                        <p class="slds-text-body_small">
                                            💬 {step.Comments__c}
                                        </p>
                                    </template>
                                </div>
                            </div>
                        </li>
                    </template>
                </ul>
            </div>
        </template>

        <!-- No Steps -->
        <template if:false={hasSteps}>
            <template if:false={isLoading}>
                <div class="slds-m-around_medium">
                    <p>No approval steps found for this contract.</p>
                </div>
            </template>
        </template>

        <!-- Refresh Button -->
        <div class="slds-m-around_medium">
            <lightning-button 
                label="Refresh Timeline" 
                icon-name="utility:refresh"
                onclick={loadSteps}>
            </lightning-button>
        </div>

    </lightning-card>
</template>
